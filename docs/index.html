<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FoodMap - 맛집 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.83.1/dist/L.Control.Locate.min.css">
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>FoodMap</h1>
      <div id="controls">
        <select id="area-filter">
          <option value="all">지역으로 이동...</option>
        </select>
        <select id="category-filter">
          <option value="all">전체 카테고리</option>
        </select>
        <select id="score-filter">
          <option value="1.75">1.75+ 전체</option>
          <option value="2.0">2.0+</option>
          <option value="2.5">2.5+ 맛집</option>
          <option value="3.0">3.0+ 갓맛집</option>
        </select>
        <label class="toggle-label"><input type="checkbox" id="hide-low-conf"><span class="toggle-switch"></span>신뢰도 부족 제외</label>
        <label class="toggle-label"><input type="checkbox" id="hide-franchise"><span class="toggle-switch"></span>프랜차이즈 제외</label>
        <span id="count-badge">0개</span>
      </div>
    </header>
    <div id="map"></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.locatecontrol@0.83.1/dist/L.Control.Locate.min.js"></script>
  <script src="app.js?v=10"></script>
</body>
</html>
